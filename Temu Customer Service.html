<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:#1C1C1E;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Helvetica Neue",Arial,sans-serif;
  transition:background 0.4s ease;
}
/* ── Phone wrapper (holds buttons + shadow) ── */
.phone-wrapper{
  position:relative;
  flex-shrink:0;
}
/* ── Side buttons ── */
.btn-side{
  position:absolute;
  background:linear-gradient(90deg,#2a2a2a,#1a1a1a);
  border-radius:2px;
  z-index:10;
}
/* Left: silent switch + volume up + volume down */
.btn-silent{width:4px;height:28px;left:-13px;top:142px;}
.btn-vol-up{width:4px;height:56px;left:-13px;top:200px;}
.btn-vol-down{width:4px;height:56px;left:-13px;top:270px;}
/* Right: power */
.btn-power{width:4px;height:76px;right:-13px;top:220px;}
/* ── Elliptical shadow beneath phone ── */
.phone-shadow{
  position:absolute;
  bottom:-38px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  height:40px;
  background:radial-gradient(ellipse at center,rgba(0,0,0,0.45) 0%,rgba(0,0,0,0.12) 50%,transparent 80%);
  border-radius:50%;
  pointer-events:none;
  filter:blur(6px);
}
/* ── Phone body ── */
.phone{
  width:390px;
  height:844px;
  background:#fff;
  border-radius:52px;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 0 0 1.5px #555,
    0 0 0 9px #1a1a1a,
    0 0 0 11px #4a4a4a;
  flex-shrink:0;
}
/* ── BG toggle button ── */
.bg-toggle{
  position:fixed;
  bottom:24px;
  right:24px;
  display:flex;
  gap:8px;
  z-index:9999;
}
.bg-toggle button{
  width:36px;height:36px;
  border-radius:50%;
  border:2.5px solid rgba(255,255,255,0.5);
  cursor:pointer;
  transition:transform 0.2s,border-color 0.2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.bg-toggle button:hover{transform:scale(1.15);}
.bg-toggle button.active{border-color:#fff;transform:scale(1.15);}
.screen{
  width:100%;height:100%;
  overflow:hidden;
  position:relative;
}
@keyframes slideInR{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideInL{from{transform:translateX(-28%)}to{transform:translateX(0)}}
@keyframes slideOutL{from{transform:translateX(0)}to{transform:translateX(-28%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes d1{0%,60%,100%{opacity:.25}30%{opacity:1}}
@keyframes d2{0%,60%,100%{opacity:.25}40%{opacity:1}}
@keyframes d3{0%,60%,100%{opacity:.25}50%{opacity:1}}
.td1{animation:d1 1.2s infinite}
.td2{animation:d2 1.2s infinite}
.td3{animation:d3 1.2s infinite}
.fade-up{animation:fadeUp 0.22s ease forwards}
.fade-in-sheet{animation:fadeInAlpha 0.16s ease forwards}
.fade-out-sheet{animation:fadeOutAlpha 0.14s ease forwards}
@keyframes fadeInAlpha{from{opacity:0}to{opacity:1}}
@keyframes fadeOutAlpha{from{opacity:1}to{opacity:0}}
::-webkit-scrollbar{width:0}
input{-webkit-appearance:none;appearance:none;}
</style>

function ProductImg({src,size=72,radius=4}){
  const chain=Array.isArray(src)?src.filter(Boolean):[src];
  const[idx,setIdx]=useState(0);
  const url=chain[idx];
  const failed=!url||idx>=chain.length;
  return failed?(
    <div style={{width:size,height:size,background:'#F5F5F5',borderRadius:radius,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>📦</div>
  ):(
    <img
      src={url}
      onError={()=>setIdx(i=>i+1)}
      style={{width:size,height:size,objectFit:'cover',borderRadius:radius,display:'block'}}
      alt="product"
    />
  );
}

const LIVE_AGENT={name:'Christopher Brooks',initial:'C'};

function ChatPage({order,onBack,exportUi}){
  const[msgs,setMsgs]=useState([]);
  const[typing,setTyping]=useState(false);

  const[phase,setPhase]=useState('greeting');

  const[showAttachSheet,setShowAttachSheet]=useState(!!exportUi?.attachSheet);
  const[liveAgent,setLiveAgent]=useState(null);
  const[agentSessionStarted,setAgentSessionStarted]=useState(false);
  const scrollRef=useRef();
  const inputRef=useRef();

  const showPostOrderChips=msgs.some(m=>m.type==='chat_order')||(order&&!showPicker);

  useEffect(()=>{
    const init=[];
    init.push({id:1,role:'system',type:'timestamp',text:'12:19 PM'});
    init.push({id:2,role:'bot',type:'text',text:'Welcome to Temu Customer Service! By continuing, you acknowledge that your chat may be monitored and used as disclosed in our __Privacy Policy__ to improve the virtual assistant and enhance your experience. Thanks for contacting. I\'m Temu\'s virtual assistant, here to help!'});
    init.push({id:3,role:'bot',type:'text',text:'Hi, slai6, what can I do for you today?'});
    if(exportUi?.skipBootstrap){
      if(order){
        const ts=Date.now();
        setMsgs([
          ...init,
          {id:ts,role:'system',type:'timestamp',text:'12:56 PM'},
          {id:ts+1,role:'system',type:'chat_order',order},
          {id:ts+2,role:'bot',type:'text',text:"Good afternoon! It's a pleasure to welcome you to Temu customer service center. How may I assist you today?"},
        ]);
      }else{
        setMsgs(init);
      }
      return;
    }
    setMsgs(init);
    if(order){
      setTimeout(()=>runOrderFlow(order,init),800);
    }
  },[]);

  function runOrderFlow(o,existingMsgs){
    const ts=Date.now();
    const newMsgs=[
      {id:ts,role:'system',type:'timestamp',text:'12:56 PM'},
      {id:ts+1,role:'system',type:'chat_order',order:o},
    ];
    setMsgs(p=>[...p,...newMsgs]);
    setTimeout(()=>{
      setTyping(true);
      setTimeout(()=>{
        setTyping(false);
        setMsgs(p=>[...p,{id:Date.now(),role:'bot',type:'text',text:"Good afternoon! It's a pleasure to welcome you to Temu customer service center. How may I assist you today?"}]);
        setTimeout(()=>{
          setTyping(true);
          setTimeout(()=>{
            setTyping(false);
            setMsgs(p=>[...p,
              {id:Date.now(),role:'bot',type:'delivery_confirmation',order:o,
                text:"Hello! We have confirmed that your order has been successfully delivered. May I ask if the product meets your expectations? If you are not satisfied or need to return the item, please let me know directly, and I will open a dedicated after-sales service channel for you and follow up throughout the process."},
            ]);
            setPhase('delivery');
            setTimeout(()=>{
              setMsgs(p=>[...p,{id:Date.now(),role:'system',type:'timestamp',text:'1:03 PM'}]);
              setTyping(true);
              setTimeout(()=>{
                setTyping(false);
                setMsgs(p=>[...p,{id:Date.now(),role:'bot',type:'followup_actions',
                  text:"We hope you're still with us. If you have any other inquiries or require further assistance, we're more than happy to help. 🙂",
                  buttons:['I have other questions','End chat'],
                }]);
                setPhase('followup');
              },1200);
            },2800);
          },1400);
        },400);
      },1300);
    },300);
  }

  useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs,typing]);

  function addUser(text){setMsgs(p=>[...p,{id:Date.now(),role:'user',type:'text',text}]);}
  function addBots(bots){const t=Date.now();setMsgs(p=>[...p,...bots.map((b,i)=>({...b,id:t+i,role:'bot'}))]);}
  function showTyping(cb,delay=1300){setTyping(true);setTimeout(()=>{setTyping(false);cb();},delay);}

  function handleIssue(issue){
    if(issue==='Return/Refund'){
      showTyping(()=>{
        addBots([{type:'issue_list',text:'Could you tell us what issue you are facing? If it is not listed below, you can share it directly in the chatbox.',issues:ISSUES}]);
        setPhase('issue_list');
      });
      return;
    }
    addUser(issue);
    if(issue==='Item arrived too late'){
      showTyping(()=>{
        addBots([
          {type:'text',text:LATE_POLICY},
          {type:'issue_list',text:'Please select the button below that best describes your problem so that we can help you as effectively as possible.',issues:ISSUES},
        ]);
        setPhase('response');
      });
    } else if(issue==='Some item(s) are missing from my package'){
      showTyping(()=>{
        addBots([
          {type:'text',text:"We're sorry to hear that! To help resolve this, we'll need to verify your order details.\n\nPlease note that missing item claims must be submitted within 30 days of delivery. Would you like us to initiate a refund or reshipping?"},
          {type:'actions',buttons:['Request Refund','Request Reshipping','Speak to Agent']},
        ]);
        setPhase('response');
      });
    } else {
      showTyping(()=>{
        addBots([
          {type:'text',text:"I completely understand your situation, dear customer. We do apologize for the inconvenience caused.\n\nYour frustration is completely understandable, and we genuinely care about your experience. Could you please tell us briefly what seems to be the issue?"},
          {type:'issue_list',text:'Please select the button below that best describes your problem:',issues:ISSUES},
        ]);
        setPhase('response');
      });
    }
  }

  function handleAction(btn){
    addUser(btn);
    if(btn==='Speak to Agent'||btn.toLowerCase().includes('agent')){doEscalate();}
    else{showTyping(()=>{addBots([{type:'text',text:"Thank you! We've initiated your request. You'll receive a confirmation within 24–48 hours.\n\nIs there anything else I can help you with?"}]);});}
  }

  function doEscalate(){
    showTyping(()=>{
      addBots([{type:'text',text:"Please accept our heartfelt apologies for the inconvenience. Your concerns are important to us, and we'll strive to help you."}]);
      showTyping(()=>{
        addBots([{type:'escalation',text:"Need a person? Tap below to reach a live specialist. Everything you've already shared in this chat will be attached so they have full context—you won't need to repeat yourself."}]);
        setPhase('escalated');
      },1400);
    },1200);
  }

  function connectLiveAgent(){
    if(agentSessionStarted)return;
    setAgentSessionStarted(true);
    addUser('Chat with our agent');
    const base=Date.now();
    showTyping(()=>{
      addBots([{type:'text',text:"Kindly bear with me for a moment as I transfer you to a live agent who is better equipped to assist you."}]);
      window.setTimeout(()=>{
        setMsgs(p=>[...p,{id:base+1,role:'system',type:'system_line',text:'Chat started'}]);
      },520);
      window.setTimeout(()=>{
        setMsgs(p=>[...p,{id:base+2,role:'bot',type:'text',text:"I've synced your earlier messages to the human agent—photos, order details, and everything above—so they can continue from here without missing anything."}]);
      },1100);
      window.setTimeout(()=>{
        setLiveAgent(LIVE_AGENT);
        setMsgs(p=>[...p,{id:base+3,role:'system',type:'agent_joined',name:LIVE_AGENT.name,initial:LIVE_AGENT.initial}]);
      },1750);
      window.setTimeout(()=>{
        setMsgs(p=>[...p,{id:base+4,role:'bot',type:'text',fromLiveAgent:true,agentInitial:LIVE_AGENT.initial,text:"Hi! I'm Christopher. I've read what you shared—how can I help you from here?"}]);
        setPhase('live_agent');
      },2350);
    },1100);
  }

  function chipSelectOrder(){setShowPicker(true);}
  /** Opens order list — “recent orders” in UI copy */
  function chipRecentOrders(){
    addUser('Recent orders');
    setShowPicker(true);
  }
  /** Cart path — prototype has no live cart; guide user to Cart tab + chat */
  function chipCartItems(){
    addUser('Cart items');
    showTyping(()=>{
      addBots([{type:'text',text:"Go to Cart from the bottom tab, select the product you need help with, then return here—or type the product name in the box below and we'll match it."}]);
    });
  }

  function handleSend(){
    const t=inputVal.trim();if(!t)return;
    setInputVal('');
    addUser(t);
    const low=t.toLowerCase();
    if(phase==='live_agent'){
      showTyping(()=>{addBots([{type:'text',fromLiveAgent:true,agentInitial:liveAgent?.initial||'C',text:"Thanks for your message—I'm reviewing it now and will reply shortly."}]);});
      return;
    }
    if(low.includes('human')||low.includes('agent')||low.includes('real person')){doEscalate();}
    else{showTyping(()=>{addBots([{type:'text',text:"Thank you for reaching out! I'm here to help. Could you please share more details so I can assist you better?"}]);});}
  }

  function renderMsg(msg){
    if(msg.type==='timestamp'){
      return(
        <div key={msg.id} style={{textAlign:'center',margin:'6px 0 10px'}}>
          <span style={{fontSize:12,color:'#AAAAAA'}}>{msg.text}</span>
        </div>
      );
    }
    if(msg.type==='system_line'){
      return(
        <div key={msg.id} className="fade-up" style={{textAlign:'center',margin:'10px 0 8px'}}>
          <span style={{fontSize:12,color:'#8E8E93',fontWeight:500}}>{msg.text}</span>
        </div>
      );
    }
    if(msg.type==='agent_joined'){
      return(
        <div key={msg.id} className="fade-up" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,margin:'12px 0 10px',padding:'0 16px'}}>
          <div style={{
            width:28,height:28,borderRadius:'50%',background:P.orange,
            display:'flex',alignItems:'center',justifyContent:'center',
            color:'#fff',fontSize:13,fontWeight:700,flexShrink:0,
          }}>{msg.initial||(msg.name&&msg.name[0])||'?'}</div>
          <span style={{fontSize:13,color:'#8E8E93',lineHeight:1.35,textAlign:'center'}}>
            <span style={{fontWeight:600,color:'#111'}}>{msg.name}</span>
            {' '}joined the chat
          </span>
        </div>
      );
    }
    if(msg.type==='chat_order'){
      const o=msg.order;
      const st=orderStatusStyles(o.status||'Delivered');
      return(
        <div key={msg.id} className="fade-up" style={{marginBottom:10}}>
          <div style={{background:'#FAFAFA',borderRadius:12,padding:'12px 14px',border:`1px solid ${P.borderMuted}`}}>
            <span style={{display:'inline-block',background:st.bg,color:st.color,padding:'4px 8px',borderRadius:6,marginBottom:8,...TY.meta,fontWeight:700,fontSize:11}}>{o.status||'Delivered'}</span>
            <p style={{...TY.meta,color:P.textGray,marginBottom:8}}>{o.items} item · {o.price}</p>
            <ProductImg src={o.img} size={62}/>
            <p style={{...TY.meta,color:'#AAA',marginTop:8,lineHeight:'1.35'}}>{o.id}</p>
          </div>
        </div>
      );
    }
    if(msg.role==='user'){
      return(
        <div key={msg.id} className="fade-up" style={{display:'flex',justifyContent:'flex-end',marginBottom:10,paddingLeft:70}}>
          <div style={{background:P.userBubble,borderRadius:'16px 16px 3px 16px',padding:'10px 14px',fontSize:14.5,color:'#111',lineHeight:1.5,maxWidth:'85%'}}>
            {msg.text}
          </div>
        </div>
      );
    }
    if(msg.type==='text'){
      if(msg.fromLiveAgent){
        const letter=msg.agentInitial||'C';
        return(
          <div key={msg.id} className="fade-up" style={{display:'flex',gap:8,marginBottom:10,paddingRight:40}}>
            <div style={{
              width:38,height:38,borderRadius:'50%',background:P.orange,flexShrink:0,
              display:'flex',alignItems:'center',justifyContent:'center',
              color:'#fff',fontSize:16,fontWeight:700,
            }}>{letter}</div>
            <div style={{background:'#fff',borderRadius:'3px 16px 16px 16px',padding:'10px 14px',fontSize:14,color:'#111',lineHeight:1.55,flex:1,boxShadow:'0 1px 3px rgba(0,0,0,0.07)'}}>
              {msg.text.split('\n').map((line,j,arr)=>(
                <React.Fragment key={j}>{line}{j<arr.length-1&&<br/>}</React.Fragment>
              ))}
            </div>
          </div>
        );
      }
      const parts=msg.text.split(/(__Privacy Policy__)/);
      return(
        <div key={msg.id} className="fade-up" style={{display:'flex',gap:8,marginBottom:10,paddingRight:40}}>
          <TemuAvatar size={38}/>
          <div style={{background:'#fff',borderRadius:'3px 16px 16px 16px',padding:'10px 14px',fontSize:14,color:'#111',lineHeight:1.55,flex:1,boxShadow:'0 1px 3px rgba(0,0,0,0.07)'}}>
            {parts.map((part,i)=>
              part==='__Privacy Policy__'
                ?<a key={i} href="#" onClick={e=>e.preventDefault()} style={{color:'#1A73E8',textDecoration:'underline'}}> Privacy Policy </a>
                :part.split('\n').map((line,j,arr)=>(
                  <React.Fragment key={j}>
                    {line.includes('http')?<a href="#" onClick={e=>e.preventDefault()} style={{color:P.orange}}>{line}</a>:line}
                    {j<arr.length-1&&<br/>}
                  </React.Fragment>
                ))
            )}
          </div>
        </div>
      );
    }
    if(msg.type==='issue_list'){
      return(
        <div key={msg.id} className="fade-up" style={{display:'flex',gap:8,marginBottom:10,paddingRight:10}}>
          <TemuAvatar size={38}/>
          <div style={{background:'#fff',borderRadius:'3px 16px 16px 16px',fontSize:14,color:'#111',flex:1,boxShadow:'0 1px 3px rgba(0,0,0,0.07)',overflow:'hidden'}}>
            <p style={{padding:'12px 14px 10px',lineHeight:1.5}}>{msg.text}</p>
            {msg.issues.map((issue,i)=>(
              <button type="button" key={i} onClick={()=>handleIssue(issue)} style={{
                width:'100%',background:'none',border:'none',cursor:'pointer',
                borderTop:`1px solid #F0F0F0`,
                padding:'13px 14px',
                display:'flex',alignItems:'flex-start',justifyContent:'space-between',
                textAlign:'left',
                ...TY.body,color:P.text,lineHeight:'1.4',gap:8,
              }}>
                <span>• {issue}</span>
                <IOSIcon name="chevron-forward-outline" color="#AAA" size={18} style={{flexShrink:0,marginTop:2}}/>
              </button>
            ))}
          </div>
        </div>
      );
    }
    if(msg.type==='actions'){
      return(
        <div key={msg.id} className="fade-up" style={{display:'flex',gap:8,marginBottom:10,paddingLeft:46,paddingRight:10}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {msg.buttons.map((btn,i)=>(
              <button type="button" key={i} onClick={()=>handleAction(btn)} style={{
                border:`1.5px solid ${btn.includes('Agent')?P.orange:'#DDD'}`,
                background:btn.includes('Agent')?'#FFF3E0':'#fff',
                color:btn.includes('Agent')?P.orange:'#111',
                borderRadius:20,padding:'8px 16px',
                fontSize:13.5,fontWeight:500,cursor:'pointer',
              }}>{btn}</button>
            ))}
          </div>
        </div>
      );
    }
    if(msg.type==='delivery_confirmation'){
      const o=msg.order;
      return(
        <div key={msg.id} className="fade-up" style={{display:'flex',gap:8,marginBottom:10,paddingRight:10}}>
          <TemuAvatar size={38}/>
          <div style={{background:'#fff',borderRadius:'3px 16px 16px 16px',padding:'12px 14px',fontSize:14,color:'#111',lineHeight:1.55,flex:1,boxShadow:'0 1px 3px rgba(0,0,0,0.07)'}}>
            <p style={{marginBottom:12,lineHeight:1.55}}>{msg.text}</p>
            {/* Embedded order sub-card */}
            <div style={{border:`1px solid ${P.borderMuted}`,borderRadius:10,padding:'10px 12px',marginBottom:10,background:P.bgPage}}>
              {(()=>{
                const st=orderStatusStyles(o.status||'Delivered');
                return(
                  <>
                    <span style={{display:'inline-block',background:st.bg,color:st.color,padding:'3px 8px',borderRadius:6,...TY.meta,fontWeight:700,fontSize:11,marginBottom:6}}>{o.status||'Delivered'}</span>
                  </>
                );
              })()}
              <p style={{...TY.meta,color:P.textGray,marginBottom:8}}>{o.items} item · {o.price}</p>
              <ProductImg src={o.img} size={56}/>
              <p style={{...TY.meta,color:'#AAA',marginTop:7,lineHeight:'1.35'}}>{o.id}</p>
            </div>
            <button type="button" onClick={()=>handleIssue('Return/Refund')} style={{
              width:'100%',background:'#fff',border:`2px solid ${P.orange}`,
              borderRadius:24,padding:'12px 0',
              ...TY.body,fontWeight:600,color:P.orange,cursor:'pointer',...TY.btnTouch,minHeight:44,
            }}>Request a Return/Refund</button>
          </div>
        </div>
      );
    }
    if(msg.type==='followup_actions'){
      return(
        <div key={msg.id} className="fade-up" style={{display:'flex',gap:8,marginBottom:10,paddingRight:10}}>
          <TemuAvatar size={38}/>
          <div style={{background:'#fff',borderRadius:'3px 16px 16px 16px',padding:'12px 14px',fontSize:14,color:'#111',lineHeight:1.55,flex:1,boxShadow:'0 1px 3px rgba(0,0,0,0.07)'}}>
            <p style={{marginBottom:12,lineHeight:1.55}}>{msg.text}</p>
            {msg.buttons.map((btn,i)=>(
              <button type="button" key={i} onClick={()=>{
                if(btn==='I have other questions'){addUser(btn);showTyping(()=>{addBots([{type:'issue_list',text:'Could you tell us what issue you are facing?',issues:ISSUES}]);setPhase('issue_list');});}
                else{addUser(btn);}
              }} style={{
                width:'100%',background:'#fff',border:'1.5px solid #111',
                borderRadius:24,padding:'11px 0',
                fontSize:15,fontWeight:500,color:'#111',cursor:'pointer',
                marginBottom:i<msg.buttons.length-1?8:0,
                display:'block',
              }}>{btn}</button>
            ))}
          </div>
        </div>
      );
    }
    if(msg.type==='escalation'){
      return(
        <div key={msg.id} className="fade-up" style={{display:'flex',gap:8,marginBottom:10,paddingRight:10}}>
          <TemuAvatar size={38}/>
          <div style={{background:'#fff',borderRadius:'3px 16px 16px 16px',padding:'12px 14px',fontSize:14,color:'#111',lineHeight:1.55,flex:1,boxShadow:'0 1px 3px rgba(0,0,0,0.07)'}}>
            <p style={{marginBottom:agentSessionStarted?10:14}}>{msg.text}</p>
            {!agentSessionStarted&&(
            <div style={{borderTop:'1px solid #F0F0F0',paddingTop:12,textAlign:'center'}}>
              <p style={{fontSize:12.5,color:'#757575',marginBottom:10}}>Still need assistance?</p>
              <button type="button" onClick={connectLiveAgent} style={{
                ...TY.btnTouch,width:'100%',maxWidth:320,minHeight:44,
                background:P.agentCtaBg,border:`1px solid ${P.agentCtaBorder}`,borderRadius:8,
                padding:'10px 16px',cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:8,margin:'0 auto',
              }}>
                <IOSIcon name="happy-outline" color={P.orange} size={20}/>
                <span style={{...TY.body,fontWeight:700,color:P.orange}}>Chat with our agent</span>
                <IOSIcon name="chevron-forward-outline" color={P.orange} size={18}/>
              </button>
            </div>
            )}
            {agentSessionStarted&&!liveAgent&&(
              <p style={{fontSize:12,color:'#8E8E93',marginTop:4,textAlign:'center'}}>Connecting you to a specialist…</p>
            )}
          </div>
        </div>
      );
    }
    return null;
  }

  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:'#F5F5F5'}}>
      <StatusBar showTemu={true}/>
      {/* Nav */}
      <div style={{background:'#fff',padding:'4px 16px 10px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #EFEFEF'}}>
        <button type="button" onClick={onBack} style={{...TY.btnTouch,background:'none',border:'none',cursor:'pointer',padding:'4px 10px 4px 0'}}>
          <IOSIcon name="chevron-back-outline" color={P.text} size={26}/>
        </button>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:17,fontWeight:600,color:'#111',lineHeight:1.2}}>{liveAgent?liveAgent.name:'Temu'}</p>
          <p style={{fontSize:12,color:'#888'}}>Customer service</p>
        </div>
        <button type="button" style={{...TY.btnTouch,display:'flex',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',fontSize:13,fontWeight:500,color:'#111'}}>
          <IOSIcon name="star-outline" color={P.text} size={20}/>
          Rate
        </button>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'12px 12px'}}>
        {msgs.map(renderMsg)}
        {typing&&(
          <div className="fade-up" style={{display:'flex',gap:8,marginBottom:10}}>
            <TemuAvatar size={38}/>
            <div style={{background:'#fff',borderRadius:'3px 16px 16px 16px',padding:'13px 16px',boxShadow:'0 1px 3px rgba(0,0,0,0.07)',display:'flex',alignItems:'center',gap:4}}>
              {[0,1,2].map(i=><div key={i} className={['td1','td2','td3'][i]} style={{width:7,height:7,borderRadius:'50%',background:'#CCC'}}/>)}
            </div>
          </div>
        )}
        <div style={{height:6}}/>
      </div>

      {/* Composer: chips + input share one bar (unified #F2 fills, one top border) */}
      <div style={{flexShrink:0,background:P.bg,borderTop:`1px solid ${P.borderMuted}`,padding:'10px 12px 30px'}}>
        <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:10,scrollbarWidth:'none',WebkitOverflowScrolling:'touch'}}>
          {!showPostOrderChips&&(
            <button type="button" onClick={chipSelectOrder} style={{
              flexShrink:0,...TY.btnTouch,height:44,padding:'0 16px',
              borderRadius:999,border:'none',
              background:'#F2F2F2',cursor:'pointer',
              ...TY.body,fontWeight:600,color:P.text,whiteSpace:'nowrap',
            }}><span style={{display:'inline-flex',alignItems:'center',gap:8}}>Select Order<IOSIcon name="cube-outline" color={P.text} size={20}/></span></button>
          )}
          {showPostOrderChips&&<>
            <button type="button" onClick={chipRecentOrders} style={{
              flexShrink:0,...TY.btnTouch,height:44,padding:'0 16px',
              borderRadius:999,border:'none',
              background:'#F2F2F2',cursor:'pointer',
              ...TY.body,fontWeight:600,color:P.text,whiteSpace:'nowrap',
            }}><span style={{display:'inline-flex',alignItems:'center',gap:8}}>Recent orders<IOSIcon name="receipt-outline" color={P.text} size={20}/></span></button>
            <button type="button" onClick={chipCartItems} style={{
              flexShrink:0,...TY.btnTouch,height:44,padding:'0 16px',
              borderRadius:999,border:'none',
              background:'#F2F2F2',cursor:'pointer',
              ...TY.body,fontWeight:600,color:P.text,whiteSpace:'nowrap',
            }}><span style={{display:'inline-flex',alignItems:'center',gap:8}}>Cart items<IOSIcon name="cart-outline" color={P.text} size={20}/></span></button>
          </>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button type="button" onClick={()=>setShowAttachSheet(true)} aria-label="Add attachment" title="Add attachment" style={{
            ...TY.btnTouch,width:44,height:44,borderRadius:'50%',flexShrink:0,
            background:'#F2F2F2',border:'none',
            cursor:'pointer',marginBottom:0,
          }}>
            <IOSIcon name="add-outline" color={P.text} size={26}/>
          </button>
          {/* Text input */}
          <div style={{flex:1,display:'flex',alignItems:'center',background:'#F2F2F2',borderRadius:22,padding:'9px 12px',gap:6}}>
            <input
              ref={inputRef}
              value={inputVal}
              onChange={e=>setInputVal(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleSend()}
              placeholder="Type your inquiry here..."
              style={{flex:1,border:'none',background:'transparent',fontSize:14,color:'#111',outline:'none'}}
            />
            {inputVal.trim()&&(
              <button type="button" onClick={handleSend} style={{...TY.btnTouch,width:32,height:32,borderRadius:'50%',background:P.orange,border:'none',cursor:'pointer',flexShrink:0}}>
                <IOSIcon name="paper-plane-outline" color="#fff" size={17}/>
              </button>
            )}
          </div>
        </div>
      </div>

      {showAttachSheet&&(
        <AttachmentSheet
          onClose={()=>setShowAttachSheet(false)}
          onPhotos={()=>{setShowAttachSheet(false);setShowPhotoPicker(true);}}
          onCamera={()=>{setShowAttachSheet(false);showTyping(()=>{addBots([{type:'text',text:'Use your camera app to capture a clear photo of the packing slip or damage, then add it via Photos.'}]);});}}
          onFiles={()=>{setShowAttachSheet(false);showTyping(()=>{addBots([{type:'text',text:'Choose Files to attach screenshots, receipts, or labels (PDF/JPG)—we\'ll keep them tied to your session.'}]);});}}
        />
      )}

      {/* Order picker sheet */}
      {showPicker&&(
        <OrderPickerSheet onSelect={o=>{
          setShowPicker(false);
          runOrderFlow(o,msgs);
        }} onClose={()=>setShowPicker(false)}/>
      )}

      {/* Photo picker sheet */}
      {showPhotoPicker&&(
        <PhotoPickerSheet onClose={()=>setShowPhotoPicker(false)}/>
      )}
    </div>
  );
}

/* ─── ATTACHMENT "+" BOTTOM SHEET ─────────────── */
function AttachmentSheet({onClose,onCamera,onPhotos,onFiles}){
  function Row({icon,title,subtitle,onClick}){
    return(
      <button type="button" onClick={()=>{onClick&&onClick();}} style={{
        width:'100%',display:'flex',alignItems:'center',gap:14,
        padding:'14px 16px',border:'none',borderBottom:`1px solid ${P.borderMuted}`,
        background:'#fff',cursor:'pointer',textAlign:'left',
        ...TY.btnTouch,minHeight:56,justifyContent:'flex-start',
      }}>
        <div style={{
          ...TY.btnTouch,width:40,height:40,borderRadius:10,flexShrink:0,
          background:P.bgPage,display:'flex',alignItems:'center',justifyContent:'center',
        }}>{icon}</div>
        <div style={{flex:1}}>
          <p style={{...TY.body,fontWeight:600,color:P.text,lineHeight:'1.3'}}>{title}</p>
          <p style={{...TY.meta,color:P.textGray,marginTop:2,lineHeight:'1.3'}}>{subtitle}</p>
        </div>
      </button>
    );
  }
  return(
    <div className="fade-in-sheet" style={{position:'absolute',inset:0,zIndex:110}}>
      <button type="button" aria-label="Close" onClick={onClose} style={{
        position:'absolute',inset:0,background:'rgba(0,0,0,0.45)',
        border:'none',cursor:'pointer',padding:0,margin:0,
      }}/>
      <div style={{
        position:'absolute',bottom:0,left:0,right:0,
        background:'#fff',borderRadius:'18px 18px 0 0',
        maxHeight:'56%',display:'flex',flexDirection:'column',
        overflow:'hidden',animation:'sheetUp 0.28s cubic-bezier(0.25,0.46,0.45,0.94)',
      }}>
        <div style={{width:36,height:5,background:'#D8D8D8',borderRadius:3,margin:'10px auto 8px'}}/>
        <p style={{...TY.header,fontSize:17,textAlign:'center',marginBottom:4}}>Attach</p>
        <p style={{...TY.meta,color:P.textGray,textAlign:'center',marginBottom:6}}>Add photos or documents</p>
        <div style={{overflowY:'auto',flex:1}}>
          <Row
            icon={<IOSIcon name="camera-outline" color={P.text} size={26}/>}
            title="Camera"
            subtitle="Take a new photo now"
            onClick={onCamera}
          />
          <Row
            icon={<IOSIcon name="images-outline" color={P.text} size={26}/>}
            title="Photos"
            subtitle="Pick from your library"
            onClick={onPhotos}
          />
          <Row
            icon={<IOSIcon name="folder-open-outline" color={P.text} size={26}/>}
            title="Files"
            subtitle="Screenshots & PDFs"
            onClick={onFiles}
          />
        </div>
        <div style={{padding:'10px 16px 34px'}}>
          <button type="button" onClick={onClose} style={{
            width:'100%',border:`1px solid ${P.border}`,borderRadius:12,...TY.btnTouch,minHeight:48,
            background:'#fff',cursor:'pointer',...TY.body,fontWeight:600,color:P.text,
          }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ─── ORDER PICKER SHEET (iOS-style; aligns with Figma node 3:5 OrderPickerSheet) ─ */
function OrderPickerSheet({onSelect,onClose,flow}){
  const[search,setSearch]=useState('');
  const[pulseId,setPulseId]=useState(null);
  const filtered=ORDERS.filter(o=>!search||o.name.toLowerCase().includes(search.toLowerCase())||o.id.includes(search));

  const header=flow==='return'
    ?{title:'Return & refund',subtitle:'Choose an order to continue'}
    :flow==='delivery'
    ?{title:'Delivery',subtitle:'Choose an order for tracking & shipping'}
    :{title:'Please select your order',subtitle:null};

  function pick(order){
    if(pulseId)return;
    setPulseId(order.id);
    window.setTimeout(()=>{
      setPulseId(null);
      onSelect(order);
    },220);
  }

  return(
    <div style={{position:'absolute',inset:0,zIndex:100}}>
      <button type="button" aria-label="Close" onClick={onClose} style={{
        position:'absolute',inset:0,background:'rgba(0,0,0,0.42)',
        backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',
        border:'none',cursor:'pointer',
      }}/>
      <div style={{
        position:'absolute',bottom:0,left:0,right:0,
        background:'#F2F2F7',
        borderRadius:'14px 14px 0 0',
        maxHeight:'78vh',
        display:'flex',
        flexDirection:'column',
        paddingBottom:28,
        animation:'sheetUp 0.28s cubic-bezier(0.25,0.46,0.45,0.94)',
        boxShadow:'0 -4px 24px rgba(0,0,0,0.12)',
      }}>
        {/* Grabber + chrome */}
        <div style={{padding:'10px 0 6px',display:'flex',justifyContent:'center'}}>
          <div style={{width:36,height:5,borderRadius:3,background:'#C7C7CC'}}/>
        </div>
        <div style={{position:'relative',padding:'0 16px 12px'}}>
          <button type="button" onClick={onClose} style={{...TY.btnTouch,position:'absolute',right:4,top:-4,background:'none',border:'none',cursor:'pointer',padding:8}}>
            <IOSIcon name="close-outline" color="#8E8E93" size={26}/>
          </button>
          <p style={{fontSize:17,fontWeight:600,color:'#000',textAlign:'center',padding:'0 44px',lineHeight:'1.25'}}>{header.title}</p>
          {header.subtitle&&(
            <p style={{...TY.meta,color:'#8E8E93',textAlign:'center',marginTop:6,lineHeight:'1.35',padding:'0 24px'}}>{header.subtitle}</p>
          )}
        </div>

        {/* Search — Figma: #f2f2f2 pill */}
        <div style={{padding:'0 16px 12px'}}>
          <div style={{
            display:'flex',alignItems:'center',gap:8,
            background:'#FFF',borderRadius:12,
            padding:'10px 14px',
            minHeight:40,

/* ══════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════ */
/** Figma / HTML export: ?figma=support|search|sheet-return|sheet-delivery|sheet-order|chat|chat-flow|chat-picker|chat-attach|chat-photo|refund-method|refund-reason|refund-confirm|refund-success */
function readFigmaQuery(){
  if(typeof window==='undefined'){
    return{screen:'support',order:null,supportSheet:null,chatExport:null,refundData:null};
  }
  const m=new URLSearchParams(window.location.search).get('figma');
  if(!m){return{screen:'support',order:null,supportSheet:null,chatExport:null,refundData:null};}
  if(m==='search'){
    return{screen:'search',order:null,supportSheet:null,chatExport:null,refundData:null};
  }
  if(m==='sheet-return'){
    return{screen:'support',order:null,supportSheet:{open:true,flow:'return'},chatExport:null,refundData:null};
  }
  if(m==='sheet-delivery'){
    return{screen:'support',order:null,supportSheet:{open:true,flow:'delivery'},chatExport:null,refundData:null};
  }
  if(m==='sheet-order'){
    return{screen:'support',order:null,supportSheet:{open:true,flow:null},chatExport:null,refundData:null};
  }
  /* Refund flow Figma exports — uses the "Out for delivery" order (ORDERS[1]) */
  if(m==='refund-method'){
    return{screen:'refund-method',order:ORDERS[1],supportSheet:null,chatExport:null,refundData:{method:null,reason:null}};
  }
  if(m==='refund-reason'){
    return{screen:'refund-reason',order:ORDERS[1],supportSheet:null,chatExport:null,refundData:{method:'credits',reason:null}};
  }
  if(m==='refund-confirm'){
    return{screen:'refund-confirm',order:ORDERS[1],supportSheet:null,chatExport:null,refundData:{method:'credits',reason:'The delivery is taking too long'}};
  }
  if(m==='refund-success'){
    return{screen:'refund-success',order:ORDERS[1],supportSheet:null,chatExport:null,refundData:{method:'credits',reason:'The delivery is taking too long'}};
  }
  if(m==='chat'||m==='chat-flow'||m==='chat-picker'||m==='chat-attach'||m==='chat-photo'){
    const order=m==='chat-picker'?null:ORDERS[0];
    const chatExport={
      forcePicker:m==='chat-picker',
      attachSheet:m==='chat-attach',
      photoPicker:m==='chat-photo',
      skipBootstrap:m!=='chat-flow',
    };
    return{screen:'chat',order,supportSheet:null,chatExport,refundData:null};
  }
  return{screen:'support',order:null,supportSheet:null,chatExport:null,refundData:null};
}

function App(){
  const fq=React.useMemo(()=>readFigmaQuery(),[]);
  const[screen,setScreen]=useState(fq.screen);
  const[selectedOrder,setSelectedOrder]=useState(fq.order);
  const[refund,setRefund]=useState(fq.refundData||{method:null,reason:null});
  const[showRefundSuccess,setShowRefundSuccess]=useState(fq.screen==='refund-success');

  function goChat(order){setSelectedOrder(order);setScreen('chat');}
  function goRefund(order){setSelectedOrder(order);setRefund({method:null,reason:null});setScreen('refund-method');}
  function handleOrderAction(order){
    /* If order is in transit + flow is return → refund flow, else chat */
    const s=(order.status||'').toLowerCase();
    const inTransit=s.includes('out for')||s.includes('shipping')||s.includes('transit');
    if(inTransit){goRefund(order);}
    else{goChat(order);}
  }
  function goBack(){
    if(screen==='chat')setScreen('support');
    else if(screen==='search')setScreen('support');
    else if(screen==='refund-method'){setScreen('support');setSelectedOrder(null);}
    else if(screen==='refund-reason')setScreen('refund-method');
    else if(screen==='refund-confirm')setScreen('refund-reason');
    else{setSelectedOrder(null);}
  }

  const BG_OPTIONS=[
    {id:'dark',color:'#1C1C1E',label:'Dark'},
    {id:'orange',color:'#FF6D00',label:'Orange'},
    {id:'white',color:'#FFFFFF',label:'White'},
  ];
  const[bg,setBg]=useState(BG_OPTIONS[0]);

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',paddingBottom:48}}>
      <div className="phone-wrapper">
        {/* Side buttons */}
        <div className="btn-side btn-silent"/>
        <div className="btn-side btn-vol-up"/>
        <div className="btn-side btn-vol-down"/>
        <div className="btn-side btn-power"/>

        <div className="phone">
          {/* Dynamic island */}
          <div style={{position:'absolute',top:13,left:'50%',transform:'translateX(-50%)',width:126,height:37,background:'#000',borderRadius:20,zIndex:200,pointerEvents:'none'}}/>
          {/* Home indicator */}
          <div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:134,height:5,borderRadius:3,background:'rgba(0,0,0,0.22)',zIndex:200,pointerEvents:'none'}}/>
          <div className="screen">
            {screen==='support'&&(
              <div style={{position:'absolute',inset:0,animation:'slideInL 0.3s ease'}}>
                <SupportPage
                  initialSheet={fq.supportSheet}
                  onOrderSelect={handleOrderAction}
                  onSearchFocus={()=>setScreen('search')}
                  onContactUs={()=>goChat(null)}
                />
              </div>
            )}
            {screen==='search'&&(
              <div style={{position:'absolute',inset:0,animation:'slideInR 0.3s ease'}}>
                <SearchPage onBack={goBack} onOrderSelect={handleOrderAction}/>
              </div>
            )}
            {screen==='refund-method'&&selectedOrder&&(
              <div style={{position:'absolute',inset:0,animation:'slideInR 0.3s ease'}}>
                <RefundMethodPage order={selectedOrder} onBack={goBack} onNext={m=>{setRefund(r=>({...r,method:m}));setScreen('refund-reason');}}/>
              </div>
            )}
            {screen==='refund-reason'&&selectedOrder&&(
              <div style={{position:'absolute',inset:0,animation:'slideInR 0.3s ease'}}>
                <RefundReasonPage order={selectedOrder} onBack={goBack} onNext={r=>{setRefund(rd=>({...rd,reason:r}));setScreen('refund-confirm');}}/>
              </div>
            )}
            {screen==='refund-confirm'&&selectedOrder&&(
              <div style={{position:'absolute',inset:0,animation:'slideInR 0.3s ease'}}>
                <RefundConfirmPage order={selectedOrder} method={refund.method} reason={refund.reason} onBack={goBack} onConfirm={()=>setShowRefundSuccess(true)}/>
              </div>
            )}
            {showRefundSuccess&&selectedOrder&&(
              <RefundSuccessSheet order={selectedOrder} method={refund.method} onClose={()=>{setShowRefundSuccess(false);setScreen('support');setSelectedOrder(null);}}/>
            )}
            {screen==='chat'&&(
              <div style={{position:'absolute',inset:0,animation:'slideInR 0.3s ease'}}>
                <ChatPage order={selectedOrder} onBack={goBack} exportUi={fq.chatExport}/>
              </div>
            )}
          </div>
        </div>

        {/* Elliptical shadow */}
        <div className="phone-shadow"/>
      </div>

      {/* Background color toggle */}
      <div className="bg-toggle">
        {BG_OPTIONS.map(o=>(
          <button
            key={o.id}
            className={bg.id===o.id?'active':''}
            style={{background:o.color}}
            title={o.label}
            onClick={()=>{setBg(o);document.body.style.background=o.color;}}
          />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
